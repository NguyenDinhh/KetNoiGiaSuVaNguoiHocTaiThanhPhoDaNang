services:
  - type: web
    name: ketnoiguoihocvagiasu-backend
    env: python
    region: singapore
    plan: free
    branch: main
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: sql
        sync: false
      - key: EMAIL_SENDER
        sync: false
      - key: EMAIL_APP_PASSWORD
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
